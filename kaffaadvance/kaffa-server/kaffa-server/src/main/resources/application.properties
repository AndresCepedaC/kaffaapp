spring.application.name=kaffa-server

# в”Ђв”Ђв”Ђ Database Configuration в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# All sensitive values read from environment variables with safe defaults
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:sqlite:kaffa_prod.db?journal_mode=WAL&busy_timeout=5000}
spring.datasource.username=${JDBC_DATABASE_USERNAME:}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${JDBC_DATABASE_DRIVER:org.sqlite.JDBC}

# в”Ђв”Ђв”Ђ Connection Pool (HikariCP) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:30000}
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:1}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:1}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}

# в”Ђв”Ђв”Ђ Server Configuration в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
server.port=${PORT:8080}

# в”Ђв”Ђв”Ђ CORS (restrict in production) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
kaffa.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# в”Ђв”Ђв”Ђ Logging в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
logging.level.root=${LOG_LEVEL:INFO}
logging.level.kaffaapp.kaffa_server=${APP_LOG_LEVEL:INFO}

# в”Ђв”Ђв”Ђ WhatsApp Integration в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
kaffa.whatsapp.phone=${WHATSAPP_PHONE:573005054912}
kaffa.whatsapp.chat.id=${WHATSAPP_CHAT_ID:120363407629108906@g.us}
kaffa.whatsapp.bot.url=${WHATSAPP_BOT_URL:http://localhost:3000/send-message}

# в”Ђв”Ђв”Ђ Thermal Printer (DigitalPos / ESC-POS / CUPS) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
kaffa.printer.enabled=${PRINTER_ENABLED:true}
kaffa.printer.name=${PRINTER_NAME:digitalpos}
kaffa.printer.store-name=${PRINTER_STORE_NAME:Kaffa La Aldea}
kaffa.printer.store-line2=${PRINTER_STORE_LINE2:CafГ© В· Cocina В· Cocteles}
kaffa.printer.paper-width=${PRINTER_PAPER_WIDTH:32}
